name: Run ranking save assertion fix

'on':
  push:
    paths:
      - '.github/workflows/run_ranking_save_assertion_fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply ranking save assertion fix
        run: python3 .github/scripts/apply_ranking_save_assertion_fix.py
      - name: Commit ranking save assertion fix
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Fix ranking edit save assertion"
          git push
