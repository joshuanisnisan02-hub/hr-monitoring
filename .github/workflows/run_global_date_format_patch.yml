name: Run global date format patch

'on':
  push:
    paths:
      - '.github/workflows/run_global_date_format_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply global date format patch
        run: python3 .github/scripts/apply_global_date_format_patch.py
      - name: Commit global date format patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Use long date format across app"
          git push
