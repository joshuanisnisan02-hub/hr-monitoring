name: Run contract modal compile fix

'on':
  push:
    paths:
      - '.github/workflows/run_ranking_modal_refresh_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply contract modal compile fix
        run: python3 .github/scripts/fix_contract_modal_compile.py
      - name: Commit contract modal compile fix
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Fix contract modal duration input"
          git push
# trigger: contract-modal-compile-fix
