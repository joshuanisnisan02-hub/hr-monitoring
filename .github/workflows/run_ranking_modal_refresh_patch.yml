name: Run contract modal upgrade patch

'on':
  push:
    paths:
      - '.github/workflows/run_ranking_modal_refresh_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply contract modal upgrade patch
        run: python3 .github/scripts/contract_modal_upgrade.py
      - name: Commit contract modal upgrade patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Upgrade contract modal input flow"
          git push
# trigger: contract-modal-upgrade
