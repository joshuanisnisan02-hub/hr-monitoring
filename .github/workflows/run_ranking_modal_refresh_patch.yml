name: Run hide resigned contracts patch

'on':
  push:
    paths:
      - '.github/workflows/run_ranking_modal_refresh_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply hide resigned contracts patch
        run: python3 .github/scripts/hide_resigned_contracts.py
      - name: Commit hide resigned contracts patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Hide resigned employees from contracts"
          git push
