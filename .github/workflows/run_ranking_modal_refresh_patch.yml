name: Run ranking modal refresh patch

'on':
  push:
    paths:
      - '.github/workflows/run_ranking_modal_refresh_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply ranking modal refresh patch
        run: python3 .github/scripts/apply_ranking_modal_refresh_patch.py
      - name: Commit ranking modal refresh patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Fix ranking modal save refresh"
          git push
