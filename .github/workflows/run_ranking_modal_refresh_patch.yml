name: Run contract modal revert patch

'on':
  push:
    paths:
      - '.github/workflows/run_ranking_modal_refresh_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore old contract modal
        run: python3 .github/scripts/revert_contract_modal_old.py
      - name: Commit old contract modal restore
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Restore old add contract modal"
          git push
# trigger: restore-old-contract-modal
