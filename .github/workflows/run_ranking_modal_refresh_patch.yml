name: Run ranking modal cleanup

'on':
  push:
    paths:
      - '.github/workflows/run_ranking_modal_refresh_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean duplicate ranking modal patch lines
        run: python3 .github/scripts/cleanup_rank_modal.py
      - name: Commit ranking modal cleanup
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Clean ranking modal duplicate patch lines"
          git push
# trigger: ranking-modal-cleanup
