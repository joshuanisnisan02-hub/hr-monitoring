name: Run live contracts restore patch

'on':
  push:
    paths:
      - '.github/workflows/run_ranking_modal_refresh_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore live contracts behavior
        run: python3 .github/scripts/restore_live_contracts_view.py
      - name: Commit live contracts restore
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Restore live contracts behavior"
          git push
# trigger: restore-live-contracts-behavior
