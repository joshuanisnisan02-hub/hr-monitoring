name: Run ranking approve button patch

'on':
  push:
    paths:
      - '.github/workflows/run_ranking_approve_button_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply ranking approve button patch
        run: python3 .github/scripts/apply_ranking_approve_button_patch.py
      - name: Commit ranking approve button patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Add ranking approval action"
          git push
