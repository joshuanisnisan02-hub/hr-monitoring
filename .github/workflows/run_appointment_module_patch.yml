name: Run appointment module patch

'on':
  push:
    paths:
      - '.github/workflows/run_appointment_module_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply appointment module patch
        run: python3 .github/scripts/apply_appointment_module_patch.py
      - name: Commit appointment module patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Add appointment module and remove ranking appointment column"
          git push
