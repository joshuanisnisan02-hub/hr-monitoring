name: Run Supabase key default patch

'on':
  push:
    paths:
      - '.github/workflows/run_supabase_key_default_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply Supabase key default patch
        run: python3 .github/scripts/apply_supabase_key_default_patch.py
      - name: Commit Supabase key default patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Add Supabase public key default"
          git push
