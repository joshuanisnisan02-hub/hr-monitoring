name: Run ranking patch script

'on':
  push:
    paths:
      - '.github/workflows/run_ranking_patch_script.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: python3 .github/scripts/apply_ranking_patch.py
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Update ranking table columns"
          git push
