name: Run print and ranking filter patch

'on':
  push:
    paths:
      - '.github/workflows/run_print_and_ranking_filter_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: python3 .github/scripts/apply_print_and_ranking_filter_patch.py
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Add module print buttons and ranking filter"
          git push
