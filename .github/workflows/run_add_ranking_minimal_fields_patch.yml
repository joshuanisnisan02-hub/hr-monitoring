name: Run add ranking minimal fields patch

'on':
  push:
    paths:
      - '.github/workflows/run_add_ranking_minimal_fields_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply add ranking minimal fields patch
        run: python3 .github/scripts/apply_add_ranking_minimal_fields_patch.py
      - name: Commit add ranking minimal fields patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Limit add ranking fields"
          git push
