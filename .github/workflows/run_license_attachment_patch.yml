name: Run license attachment patch

'on':
  push:
    paths:
      - '.github/workflows/run_license_attachment_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply license attachment patch
        run: python3 .github/scripts/apply_license_attachment_patch.py
      - name: Commit license attachment patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Update license table and attachment input"
          git push
