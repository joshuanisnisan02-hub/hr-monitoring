name: Run ranking employee autocomplete patch

'on':
  push:
    paths:
      - '.github/workflows/run_ranking_employee_autocomplete_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply ranking employee autocomplete patch
        run: python3 .github/scripts/apply_ranking_employee_autocomplete_patch.py
      - name: Commit ranking employee autocomplete patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add lib/main.dart
          git diff --cached --quiet && exit 0
          git commit -m "Make ranking employee selection searchable"
          git push
